{% extends 'webadmin/base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Acesso ao Painel</h2>
    
    {% if form.errors %}
    <p class="text-red-500 text-sm mb-4">Seu nome de usuário ou senha estão incorretos. Tente novamente.</p>
    {% endif %}

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-gray-700 font-medium mb-1" for="id_username">Usuário</label>
            <input type="text" name="username" id="id_username" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-[#0A7DD1]" required>
        </div>
        <div>
            <label class="block text-gray-700 font-medium mb-1" for="id_password">Senha</label>
            <input type="password" name="password" id="id_password" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-[#0A7DD1]" required>
        </div>
        <button type="submit" class="w-full mobile-gradient text-white py-2 rounded-lg font-semibold shadow-md hover:opacity-90 transition">Login</button>
    </form>
</div>
{% endblock %}
