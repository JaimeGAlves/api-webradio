{% extends 'webadmin/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h2 class="text-3xl font-bold text-gray-800 mb-6">Visão Geral</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white rounded-lg shadow-md p-6 border-t-4 border-[#0AC7BE]">
            <h3 class="text-xl font-semibold text-gray-700 mb-2">Notícias Cadastradas</h3>
            <p class="text-4xl font-bold text-[#0051BA]">{{ noticias_count }}</p>
            <a href="{% url 'admin_noticias_list' %}" class="mt-6 inline-flex items-center gap-2 px-5 py-2.5 bg-[#0051BA]/10 text-[#0051BA] font-bold rounded-lg hover:bg-[#0051BA] hover:text-white transition-all duration-300 group">
                Ver notícias
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
            </a>
        </div>
        
        <div class="bg-white rounded-lg shadow-md p-6 border-t-4 border-[#2D0AC7]">
            <h3 class="text-xl font-semibold text-gray-700 mb-2">Patrocinadores</h3>
            <p class="text-4xl font-bold text-[#0051BA]">{{ sponsors_count }}</p>
            <a href="{% url 'admin_sponsors_list' %}" class="mt-6 inline-flex items-center gap-2 px-5 py-2.5 bg-[#0051BA]/10 text-[#0051BA] font-bold rounded-lg hover:bg-[#0051BA] hover:text-white transition-all duration-300 group">
                Ver patrocinadores
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
            </a>
        </div>
    </div>
</div>
{% endblock %}
